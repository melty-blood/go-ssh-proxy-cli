
# 默认执行的命令, 可选: sshproxy acgpic, Tip: nettouch grep 暂不支持
# acgpic publish sshproxy. Tip: nettouch and grep Not supported yet
DefaultCommand: "sshproxy"

AcgPic:
  TargetImg: "/dev/shm/acg_image1.jpg"
  SearchImgDir: "/dev/shm/temp"
  Threshold: 20

# ${ENV_NAME}      : EnvList.EnvNum
# ${SSH_ENV_PATH}  : EnvList.EnvPath
# ${UPLOAD_PATH}   : SftpUploadPath
# ${PACKAGE_NAME}  : SftpUploadPath 路径中指定的文件名,如"/home/akiha/lovelive/file.tar.gz"中的"file.tar.gz"
# ${PACKAGE_PATH}  : EnvList.EnvPath拼上${PACKAGE_NAME}
Publish:
  GitList: [
    {
      "KeyName": "lovelive", # only one, key name
      "RepoUrl": "GIT_PATH",
      "ClonePath": "/dev/shm/code_dir/lovelive_code",
      "TargzPath": "/dev/shm/code_dir/code.tar.gz",
      "TargzIsNeedTopDir": false, # Whether to perform compression requires an upper-level folder
      "CheckBranch": "CHECKOUT_BRANCH", # local branch
      "RemoteName": "origin",
      "RemoteBranch": "REMOTE_BRANCH",
      "SSHGitUser": "git",
      "SSHGitIdentityFile": "SSH_GIT_AUTH_KEY",
      "SSHGitIdentityPasswd": "",
      "HttpsGitUser": "GIT_USER",
      "HttpsGitPat": "GPT",
      "EnvList": [
        {
          "EnvNum": "env1",
          "EnvPath": "/home/akiha/lovelive/env_one",
        },
        {
          "EnvNum": "ll",
          "EnvPath": "/home/akiha/lovelive/temp_code/code",
        },
      ],
      "SftpUploadPath": "TARGET_UPLOAD_PATH", # /home/akiha/lovelive/code.tar.gz
      "SSHHost": "SSH_HOST_IP",
      "SSHPort": "PORT",
      "SSHUser": "USER_NAME",
      "SSHPasswd": "SSH_PASSWORD",
      "SSHCmd": ["pwd", "cd /home/akiha/lovelive/", "pwd", "ls -lh", "mv ${UPLOAD_PATH} ${SSH_ENV_PATH}", "tar -zxf ${PACKAGE_PATH} -C ${SSH_ENV_PATH}", "rm -f ${PACKAGE_PATH}", "cd ${SSH_ENV_PATH}", "pwd", "echo 'init action'"],
    },
    {
      "KeyName": "idoly-pride", # only one, key name
      "RepoUrl": "GIT_PATH",
      "ClonePath": "/dev/shm/code_dir/lovelive_code",
      "TargzPath": "/dev/shm/code_dir/code.tar.gz",
      "TargzIsNeedTopDir": false, # Whether to perform compression requires an upper-level folder
      "CheckBranch": "CHECKOUT_BRANCH", # local branch
      "RemoteName": "origin",
      "RemoteBranch": "REMOTE_BRANCH",
      "SSHGitUser": "git",
      "SSHGitIdentityFile": "SSH_GIT_AUTH_KEY",
      "SSHGitIdentityPasswd": "",
      "HttpsGitUser": "GIT_USER",
      "HttpsGitPat": "GPT",
      "EnvList": [
        {
          "EnvNum": "env1",
          "EnvPath": "/home/akiha/lovelive/env_one",
        },
        {
          "EnvNum": "ll",
          "EnvPath": "/home/akiha/lovelive/temp_code/code",
        },
      ],
      # 是否支持多机器部署
      "IsSSHCluster": false,
      "SSHCluster": [
        {
          "SSHHost": "SSH_HOST_IP",
          "SSHPort": "PORT",
          "SSHUser": "USER_NAME",
          "SSHPasswd": "SSH_PASSWORD",
          "SSHIdentityFile": "",
          # 是否使用顶部配置的命令
          "IsUseParentCmd": true,
          # 如果不使用顶部命令则在此配置命令
          "SSHCmd": [],
          # 是否展示命令输出 默认:true
          "IsShowSSHCmdOut": true,
        },
      ],
      "SftpUploadPath": "TARGET_UPLOAD_PATH",
      "SSHHost": "SSH_HOST_IP",
      "SSHPort": "PORT",
      "SSHUser": "USER_NAME",
      "SSHPasswd": "ssh_PASSWORD",
      # ssh密钥登陆, 如果配置优先使用
      "SSHIdentityFile": "",
      "SSHCmd": ["pwd", "cd /home/akiha/lovelive/", "pwd", "ls -lh", "mv ${UPLOAD_PATH} ${SSH_ENV_PATH}", "tar -zxf ${PACKAGE_PATH} -C ${SSH_ENV_PATH}", "rm -f ${PACKAGE_PATH}", "cd ${SSH_ENV_PATH}", "pwd", "echo 'init action'"],
      # 是否展示命令输出 默认:true
      "IsShowSSHCmdOut": true,
    }
  ]

# 此节点配置用于代理内网访问, 类似于翻墙到内网, 可以不用在内网安装任何软件
# kill -USR2 PID 可以让程序不中断前的情况下重新连接代理服务
SockProxy:
  ServerName: "paydayloan-proxy"
  OpenStatus: true
  ServerHost: "SERVER_IP:PORT"
  ServerUser: "SSH_USERNAME"
  ServerPassword: "SSH_PASSWORD"
  ServerPriKey: ""
  NeedJump: false
  Local: "127.0.0.1:22122"
  Proxy: "PROXY_IP:PORT"
  # 目前只能使用命令, 同时需要配置ssh别名和公钥登陆
  SSHCommand: "ssh -ND 22122 -J TypeMoon cloudServer"

# sock5 转 http代理, 后续增加转https代理功能
SockToHttp:
  ServerName: socktohttp-all
  OpenStatus: true
  SockAddr: 127.0.0.1:22122
  ToHttp: 127.0.0.1:7890

ServerConf:
  # 在 /dev/shm/order 文件中写入 OrderSSHProxyReloadOne:lovelive-honoka,lovelive-kotori,
  # 后执行 kill -USR1 PID 可以在不中断程序的情况下让代理服务进行重新连接
  SignalOrderFilePath: "/dev/shm/order" # 使用 kill 发送 USR1,USR2 信号时所读取的配置
  # 跳板机 相当于ssh -J 选项
  Jump: {
    JumpHost: "JUMP_IP:PORT",
    JumpUser: "JUMP_SSH_USERNAME",
    JumpPassword: "JUMP_SSH_PASSWORD",
    JumpPriKey: ""
  }

  SSHConf: [
    {
      # ServerName 不能重复
      "ServerName": "lovelive-kotori",
      "OpenStatus": true,
      "ServerHost": "SERVER_IP:PORT",
      "ServerUser": "SSH_USERNAME",
      "ServerPassword": "SSH_PASSWORD",
      "ServerPriKey":"",
      "NeedJump": false,
      "Local": "127.0.0.1:20022",
      "Proxy": "PROXY_IP:PORT",
    },
    {
      "ServerName": "lovelive-honoka",
      # false 则不使用此配置
      "OpenStatus": false,
      "ServerHost": "SERVER_IP:PORT",
      "ServerUser": "SSH_USERNAME",
      "ServerPassword": "SSH_PASSWORD",
      "ServerPriKey":"",
      "NeedJump": false,
      "Local": "127.0.0.1:28013",
      "Proxy": "PROXY_IP:PORT",
    }
  ]
